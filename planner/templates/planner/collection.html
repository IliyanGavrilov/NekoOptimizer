{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Collection &mdash; Neko Optimizer</title>
</head>
<body>
  <h1>Collection</h1>
  <p><a href="{% url 'planner' %}">&larr; Back to planner</a></p>

  <h2>Add a cat</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Add</button>
  </form>

  <h2>Your cats</h2>
  <input type="search" data-filter="catList" placeholder="Filter cats&hellip;">
  <form method="post">
    {% csrf_token %}
    <table id="catList">
      <tr><th>Cat</th><th>Rarity</th><th>Owned</th><th>Wanted</th></tr>
      {% for cat in cats %}
        <tr data-name="{{ cat.name }}">
          <td>{{ cat.name }}</td>
          <td>{{ cat.rarity }}</td>
          <td><input type="checkbox" name="owned" value="{{ cat.pk }}" {% if cat.owned %}checked{% endif %}></td>
          <td><input type="checkbox" name="wanted" value="{{ cat.pk }}" {% if cat.wanted %}checked{% endif %}></td>
        </tr>
      {% endfor %}
    </table>
    <button type="submit" name="save">Save</button>
  </form>

  <script src="{% static 'planner/filter.js' %}"></script>
</body>
</html>
