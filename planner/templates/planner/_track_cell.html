<td class="cell">{% for e in entries %}<div class="entry{% if e.on_path %} on-path{% endif %}{% if e.target %} target{% endif %}{% if e.switch %} switch{% endif %}">{% if multi > 1 %}<span class="tag">{{ e.tag }}</span> {% endif %}{{ e.cat }} <span class="rarity" data-rarity="{{ e.rarity }}">{{ e.rarity }}</span>{% if e.arrow %}<span class="arrow">&#8627; {{ e.arrow.cat }} &rarr; {{ e.arrow.to }}</span>{% endif %}</div>{% endfor %}</td>
