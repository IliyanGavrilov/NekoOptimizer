<td class="cell{% if cell_class %} {{ cell_class }}{% endif %}">{% for e in entries %}<div class="entry{% if e.on_path %} on-path{% endif %}{% if e.target %} target{% endif %}{% if e.switch %} switch{% endif %}{% if e.new %} new{% endif %}{% if e.owned %} owned{% endif %}{% if e.wanted %} wanted{% endif %}{% if e.shared %} shared{% endif %}"{% if e.shared %} title="This step of the plan can be rolled on this banner instead - you'd get this cat, and the rest of the plan still works"{% endif %}>{% if multi > 1 %}<span class="tag">{{ e.tag }}</span> {% endif %}<button type="button" class="catlink" data-name="{{ e.cat }}">{{ e.cat }}</button> <span class="rarity" data-rarity="{{ e.rarity }}">{{ e.rarity }}</span>{% if e.arrow %}<span class="arrow">{% if e.arrow.left %}&#8626;{% else %}&#8627;{% endif %} dupe, jumps to {{ e.arrow.to }}</span>{% endif %}</div>{% endfor %}{% if cell_seed %}<button type="button" class="reseed" data-seed="{{ cell_seed }}" title="Roll to here: set the seed so this cell becomes the next roll (1A)" aria-label="Roll to here"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="12" height="12" x="2" y="10" rx="2" ry="2"/><path d="m17.92 14 3.5-3.5a2.24 2.24 0 0 0 0-3l-5-4.92a2.24 2.24 0 0 0-3 0L10 6"/><path d="M6 18h.01"/><path d="M10 14h.01"/><path d="M15 6h.01"/><path d="M18 9h.01"/></svg></button>{% endif %}</td>
