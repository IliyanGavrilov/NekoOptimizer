<td class="cell{% if cell_class %} {{ cell_class }}{% endif %}">{% for e in entries %}<div class="entry{% if e.on_path %} on-path{% endif %}{% if e.target or e.alt.target %} target{% endif %}{% if e.new %} new{% endif %}{% if e.owned %} owned{% endif %}{% if e.wanted %} wanted{% endif %}{% if e.shared %} shared{% endif %}"{% if e.shared %} title="This step of the plan can be rolled on this banner instead - you'd get this cat, and the rest of the plan still works"{% endif %}>{% if multi > 1 %}<span class="tag">{{ e.tag }}</span> {% endif %}<button type="button" class="catlink{% if e.target %} target{% endif %}" data-name="{{ e.cat }}">{{ e.cat }}</button> <span class="rarity" data-rarity="{{ e.rarity }}">{{ e.rarity }}</span>{% if cell_class and e.seed %} <button type="button" class="reseed inline" data-seed="{{ e.seed }}" data-cat="{{ e.cat }}" title="Rolled this guaranteed multi? Jump the seed to just after its final draw" aria-label="Jump the seed to just after this guaranteed multi">{% include "planner/_dice_icon.html" %}</button>{% endif %}{% if e.alt %}<span class="arrow"{% if e.switch %} title="Following the track dupes here: the previous pull obtains this same cat, so this cell rerolls into the branch value and jumps tracks"{% else %} title="Only when the arriving pull already holds this cell's cat (a bounce path, or your remembered last pull): it rerolls into the branch value and jumps tracks"{% endif %}>{% if e.alt.left %}&#8626;{% else %}&#8627;{% endif %} if dupe: <button type="button" class="catlink{% if e.alt.target %} target{% endif %}" data-name="{{ e.alt.cat }}">{{ e.alt.cat }}</button>, jumps to {{ e.alt.to }}{% if e.alt.seed %} <button type="button" class="reseed inline" data-seed="{{ e.alt.seed }}" data-cat="{{ e.alt.cat }}" title="Got {{ e.alt.cat }} here? Jump the seed to just after that reroll" aria-label="Jump the seed to just after {{ e.alt.cat }}">{% include "planner/_dice_icon.html" %}</button>{% endif %}</span>{% endif %}</div>{% endfor %}{% if cell_seed %}<button type="button" class="reseed" data-seed="{{ cell_seed }}" data-cat="{{ cell_cat }}" title="Rolled {{ row.pos }}{{ cell_track }}? Jump the seed to just after it (its normal roll; a dupe's branch has its own dice)" aria-label="Jump the seed to just after {{ row.pos }}{{ cell_track }}">{% include "planner/_dice_icon.html" %}</button>{% endif %}</td>
