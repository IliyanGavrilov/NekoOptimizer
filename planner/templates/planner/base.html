{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Neko Optimizer{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="{% static 'planner/style.css' %}">
</head>
<body>
  <header class="site-header">
    <div class="bar">
      <a class="brand" href="{% url 'planner' %}">🐾 Neko Optimizer</a>
      <nav>
        <a href="{% url 'planner' %}">Planner</a>
        <a href="{% url 'collection' %}">Collection</a>
      </nav>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="{% static 'planner/app.js' %}"></script>
</body>
</html>
