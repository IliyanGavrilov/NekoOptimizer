name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 6 * * 1" # weekly, offset from the Security workflow

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: github/codeql-action/init@v3
        with:
          languages: python

      - uses: github/codeql-action/analyze@v3
