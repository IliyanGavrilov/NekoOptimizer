name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, to catch CVEs disclosed after a merge

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      # pip-audit/bandit are CI-only tools, not app deps, so install them here
      # (Dependabot doesn't track them; the weekly run keeps the data fresh).
      - name: Install scanners
        run: pip install pip-audit bandit

      - name: Known CVEs in dependencies
        run: pip-audit -r requirements.txt

      - name: Python security lint
        run: bandit -r neko planner --skip B101 # B101 = asserts, used throughout tests
